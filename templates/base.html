<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Biblioteca Digital{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar, .footer {
            background-color: #161b22;
        }
        a, a:hover {
            color: #58a6ff;
        }
        .btn-custom {
            background-color: #238636;
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: #2ea043;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4">
        <a class="navbar-brand" href="{{ url_for('index') }}">📚 Biblioteca Digital</a>
        <a class="btn btn-sm btn-custom" href="{{ url_for('agregar') }}">+ Agregar libro</a>
    </nav>

    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer text-center py-3">
        <small>Desarrollado para tu entrega 😎</small>
    </footer>
</body>
</html>
