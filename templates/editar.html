{% extends 'base.html' %}

{% block title %}Editar libro{% endblock %}

{% block content %}
<h2>Editar libro</h2>
<form method="POST" class="mt-4">
    <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" class="form-control" name="titulo" value="{{ libro.titulo }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Autor</label>
        <input type="text" class="form-control" name="autor" value="{{ libro.autor }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Categoría</label>
        <input type="text" class="form-control" name="categoria" value="{{ libro.categoria }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Etiquetas</label>
        <input type="text" class="form-control" name="etiquetas" value="{{ libro.etiquetas }}">
    </div>
    <button type="submit" class="btn btn-custom">Actualizar</button>
</form>
{% endblock %}
